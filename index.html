<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium AI Promotion Studio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="app-container">
    <header class="animate-reveal" style="text-align: center; margin-bottom: 5rem;">
      <div style="display: inline-block; padding: 0.5rem 1.5rem; border-radius: 100px; background: rgba(0,0,0,0.05); font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem; letter-spacing: 2px; text-transform: uppercase;">Next-Gen Marketing</div>
      <h1 class="hero-gradient-text" style="font-size: clamp(3rem, 8vw, 5rem); font-weight: 800; line-height: 1.1; letter-spacing: -2px;">제품홍보 AI<br>Promotion Studio</h1>
    </header>

    <main>
      <section id="input-section" class="glass-card animate-reveal" style="max-width: 800px; margin: 0 auto; animation-delay: 0.2s;">
        <div style="display: grid; grid-template-columns: 1fr; gap: 1rem;">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <div>
              <label style="font-weight: 700; color: var(--primary-color); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 0.5rem; display: block;">홍보할 상품명</label>
              <input type="text" id="product-name" class="input-field" placeholder="무선 헤드폰, 전기차 등">
            </div>
            <div>
              <label style="font-weight: 700; color: var(--primary-color); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 0.5rem; display: block;">타켓 오디언스</label>
              <input type="text" id="target-audience" class="input-field" placeholder="20대 직장인, 운동 선수 등">
            </div>
          </div>
          
          <label style="font-weight: 700; color: var(--primary-color); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 0.5rem; display: block;">글로벌 타겟 국가</label>
          <select id="target-country" class="input-field">
            <option value="USA">United States (English)</option>
            <option value="UK">United Kingdom (English)</option>
            <option value="Japan">Japan (日本語)</option>
            <option value="China">China (简体中文)</option>
            <option value="France">France (Français)</option>
            <option value="Germany">Germany (Deutsch)</option>
            <option value="Spain">Spain (Español)</option>
            <option value="Italy">Italy (Italiano)</option>
            <option value="Brazil">Brazil (Português)</option>
            <option value="Vietnam">Vietnam (Tiếng Việt)</option>
            <option value="Thailand">Thailand (ไทย)</option>
          </select>
          
          <div style="text-align: center; margin-top: 2rem;">
            <button id="generate-btn" class="btn-primary">
              생성하기 <i data-lucide="sparkles"></i>
            </button>
          </div>
        </div>
      </section>

      <section id="result-section" style="display: none; margin-top: 2rem;">
        <div id="loading-state" style="text-align: center; padding: 5rem 0;">
          <div style="width: 80px; height: 80px; border: 4px solid var(--primary-color); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite; margin: 0 auto;"></div>
          <h2 style="margin-top: 2rem; font-weight: 800; font-size: 1.5rem;">AI 컨셉 분석 중...</h2>
          <p style="opacity: 0.6;">글로벌 트렌드와 마케팅 데이터를 수집하고 있습니다.</p>
        </div>

        <div id="output-content">
          <!-- Premium results injected here -->
        </div>
      </section>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
