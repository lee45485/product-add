<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>제품홍보 AI 앱 - Premium Promotion Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <header class="animate-in" style="text-align: center; margin-bottom: 4rem;">
      <h1 style="font-size: 3.5rem; font-weight: 700; background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">제품홍보 AI</h1>
      <p style="color: var(--text-color); opacity: 0.7; font-size: 1.2rem; margin-top: 1rem;">고객의 마음을 사로잡는 프리미엄 홍보 문구를 만들어보세요.</p>
    </header>

    <main>
      <section id="input-section" class="glass-card animate-in" style="max-width: 600px; margin: 0 auto;">
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
          <label style="font-weight: 600;">홍보할 상품</label>
          <input type="text" id="product-name" class="input-field" placeholder="예: 무선 노이즈 캔슬링 헤드폰">
          
          <label style="font-weight: 600;">홍보 대상 (타겟층)</label>
          <input type="text" id="target-audience" class="input-field" placeholder="예: 2030 직장인, 음악 애호가">
          
          <label style="font-weight: 600;">홍보 국가</label>
          <select id="target-country" class="input-field">
            <option value="USA">미국 (USA)</option>
            <option value="UK">영국 (UK)</option>
            <option value="Japan">일본 (Japan)</option>
            <option value="China">중국 (China)</option>
            <option value="France">프랑스 (France)</option>
            <option value="Germany">독일 (Germany)</option>
            <option value="Spain">스페인 (Spain)</option>
            <option value="Italy">이탈리아 (Italy)</option>
            <option value="Brazil">브라질 (Brazil)</option>
            <option value="Vietnam">베트남 (Vietnam)</option>
            <option value="Thailand">태국 (Thailand)</option>
          </select>
          
          <button id="generate-btn" class="btn-primary" style="margin-top: 1rem;">홍보문구 생성하기</button>
        </div>
      </section>

      <section id="result-section" style="display: none; margin-top: 4rem;">
        <div id="loading-state" style="text-align: center; margin-bottom: 2rem;">
          <div class="glass-card" style="display: inline-block; padding: 3rem;">
            <div style="width: 50px; height: 50px; border: 5px solid var(--primary-color); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 1.5rem; font-weight: 600;">AI가 글로벌 트렌드를 분석하고 있습니다...</p>
          </div>
        </div>

        <div id="output-content" class="animate-in" style="display: none;">
          <!-- Results will be injected here -->
        </div>
      </section>
    </main>
  </div>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script src="main.js"></script>
</body>
</html>
